name: Publicar Horoscopo Diario

on:
  schedule:
    # Se ejecuta a las 23:37 UTC (00:37 en España)
    - cron: '37 23 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Esta línea es la que elimina el aviso de Node.js
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: false
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar librerias
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: Ejecutar script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
        run: python generar_horoscopos.py
