name: Publicar Horoscopo Diario

on:
  schedule:
    # Se ejecuta todos los días a las 00:00 UTC (01:00 en España)
    - cron: '0 0 * * *'
  workflow_dispatch: # Esto permite darle al botón de "Play" a mano

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar script de horóscopo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
        run: python generar_horoscopos.py
